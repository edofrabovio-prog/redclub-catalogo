<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#15120f" />
  <title>RedClub | Profumi selezionati</title>
  <style>
    :root { --ink:#191512; --cream:#f8f4ed; --paper:#fffdfa; --red:#c22b26; --line:#e7dfd4; --muted:#726a62; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:radial-gradient(circle at 92% 0%,#f0ddd6 0,transparent 26rem),var(--cream); }
    button { font:inherit; cursor:pointer; }
    .shell { max-width:1180px; margin:auto; padding:0 20px 110px; }
    header { display:flex; align-items:center; justify-content:space-between; padding:18px 0; position:sticky; top:0; z-index:5; background:rgba(248,244,237,.78); backdrop-filter:blur(16px); }
    .brand { display:flex; align-items:center; gap:10px; font-family:Georgia,serif; font-size:1.3rem; font-weight:700; letter-spacing:-.04em; }
    .brand-logo { width:45px; height:45px; border-radius:12px; object-fit:cover; object-position:50% 12%; box-shadow:0 5px 14px rgba(0,0,0,.18); }
    .list-button { border:1px solid var(--ink); border-radius:999px; background:var(--ink); color:white; padding:11px 16px; font-weight:750; box-shadow:0 6px 15px rgba(25,21,18,.15); }
    .hero { background:linear-gradient(110deg,rgba(16,13,11,.98),rgba(16,13,11,.78)),url('assets/redclub-logo.png') center 42%/cover; color:white; border-radius:28px; padding:52px clamp(24px,6vw,72px); margin-bottom:30px; overflow:hidden; position:relative; box-shadow:0 18px 40px rgba(29,20,15,.2); }
    .hero::after { content:""; width:270px; height:270px; border:1px solid rgba(255,255,255,.3); border-radius:50%; position:absolute; right:-90px; top:-115px; }
    .eyebrow { color:#f19a86; font-size:.78rem; text-transform:uppercase; letter-spacing:.16em; font-weight:800; }
    h1 { max-width:620px; font:700 clamp(2.35rem,6vw,4.8rem)/.96 Georgia,serif; letter-spacing:-.055em; margin:14px 0; position:relative; z-index:1; }
    .hero p { color:#e0d9cf; max-width:530px; margin:0; line-height:1.55; position:relative; z-index:1; }
    .toolbar { display:flex; gap:12px; flex-wrap:wrap; margin:28px 0 20px; }
    .search { flex:1 1 260px; min-width:0; border:1px solid var(--line); border-radius:12px; padding:13px 14px; background:var(--paper); font:inherit; }
    .filters { display:flex; gap:8px; overflow:auto; padding-bottom:2px; }
    .filter { border:1px solid var(--line); border-radius:999px; padding:10px 14px; background:var(--paper); color:var(--muted); white-space:nowrap; }
    .filter.active { color:white; background:var(--ink); border-color:var(--ink); }
    .notice { color:var(--muted); margin:0 0 18px; font-size:.92rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(205px,1fr)); gap:16px; }
    .card { background:rgba(255,253,250,.9); border:1px solid rgba(231,223,212,.88); border-radius:18px; padding:12px; display:flex; flex-direction:column; min-height:340px; box-shadow:0 8px 24px rgba(41,29,20,.05); transition:transform .18s,box-shadow .18s; }
    .card:hover { transform:translateY(-4px); box-shadow:0 16px 30px rgba(41,29,20,.12); }
    .product-image { width:100%; height:190px; object-fit:cover; border-radius:10px; background:#eee9e1; }
    .badge { align-self:flex-start; color:var(--red); background:#fdeae6; padding:5px 8px; border-radius:999px; font-size:.72rem; font-weight:800; margin-top:12px; }
    .product-name { font:700 1.04rem/1.2 Georgia,serif; margin:9px 0 4px; }
    .meta { color:var(--muted); font-size:.83rem; margin:0 0 14px; }
    .price-tag { color:var(--red); font-weight:700; font-size:.9rem; margin:0 0 14px; }
    .add { width:100%; margin-top:auto; padding:11px; border:0; border-radius:10px; color:white; background:var(--ink); font-weight:750; transition:background .15s,transform .15s; }
    .add:hover { background:var(--red); }
    .add:active { transform:scale(.98); }
    .empty { grid-column:1/-1; text-align:center; padding:46px 12px; color:var(--muted); }
    .drawer { position:fixed; inset:0; background:rgba(20,16,12,.48); opacity:0; pointer-events:none; transition:.2s; z-index:10; }
    .drawer.open { opacity:1; pointer-events:auto; }
    .panel { position:absolute; right:0; top:0; bottom:0; width:min(440px,100%); background:var(--paper); padding:24px; transform:translateX(100%); transition:.25s; display:flex; flex-direction:column; }
    .drawer.open .panel { transform:none; }
    .panel-head { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line); padding-bottom:17px; }
    .panel h2 { font:700 1.8rem Georgia,serif; margin:0; }
    .close { background:none; border:0; font-size:1.6rem; line-height:1; }
    .items { overflow:auto; flex:1; }
    .item { display:grid; grid-template-columns:58px 1fr auto; gap:11px; align-items:center; padding:15px 0; border-bottom:1px solid var(--line); }
    .item img { width:58px; height:58px; object-fit:cover; border-radius:8px; }
    .item-name { font-weight:700; margin:0 0 3px; }
    .item-meta { color:var(--muted); font-size:.82rem; margin:0; }
    .remove { background:none; border:0; color:var(--red); font-size:1.2rem; padding:4px 8px; }
    .panel-foot { border-top:1px solid var(--line); padding-top:17px; margin-top:12px; }
    .whatsapp { display:block; width:100%; padding:14px; border:0; border-radius:12px; color:white; background:#25D366; font-weight:800; font-size:1rem; text-align:center; text-decoration:none; box-shadow:0 8px 20px rgba(37,211,102,.25); }
    .whatsapp:hover { background:#1da851; }
    .count { display:inline-block; background:var(--red); color:white; border-radius:999px; padding:2px 8px; font-size:.78rem; margin-left:6px; font-weight:800; }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <img src="assets/redclub-logo.png" alt="RedClub" class="brand-logo" />
        <span>RedClub</span>
      </div>
      <button class="list-button" onclick="toggleDrawer()">
        Lista <span class="count" id="count">0</span>
      </button>
    </header>

    <section class="hero">
      <div class="eyebrow">Profumi selezionati</div>
      <h1>Trova il tuo prossimo profumo.</h1>
      <p>Aggiungi i prodotti alla lista e ricevi informazioni e prezzo direttamente su WhatsApp.</p>
    </section>

    <div class="toolbar">
      <input class="search" id="search" type="text" placeholder="Cerca profumo, marca..." oninput="render()" />
      <div class="filters" id="filters"></div>
    </div>
    <p class="notice">Tutti i prodotti sono disponibili. Prezzo su richiesta.</p>
    <div class="grid" id="grid"></div>
  </div>

  <div class="drawer" id="drawer" onclick="if(event.target===this)toggleDrawer()">
    <div class="panel">
      <div class="panel-head">
        <h2>La tua lista</h2>
        <button class="close" onclick="toggleDrawer()">×</button>
      </div>
      <div class="items" id="items"></div>
      <div class="panel-foot">
        <a class="whatsapp" id="whatsapp" href="#" onclick="sendWhatsApp(event)">Invia su WhatsApp</a>
      </div>
    </div>
  </div>

    ];

    const WHATSAPP_NUMBER = "391234567890"; // ⚠️ CAMBIA CON IL TUO NUMERO WHATSAPP
    let list = JSON.parse(localStorage.getItem("list") || "[]");
    let activeFilter = "Tutti";

    function render() {
      const search = document.getElementById("search").value.toLowerCase();
      const brands = ["Tutti", ...new Set(PRODUCTS.map(p => p.brand))].sort();
      
      document.getElementById("filters").innerHTML = brands.map(b => 
        `<button class="filter ${b === activeFilter ? 'active' : ''}" onclick="setFilter('${b}')">${b}</button>`
      ).join("");
      
      const filtered = PRODUCTS.filter(p => 
        (activeFilter === "Tutti" || p.brand === activeFilter) &&
        (p.name.toLowerCase().includes(search) || p.brand.toLowerCase().includes(search))
      );
      
      document.getElementById("grid").innerHTML = filtered.length ? filtered.map(p => `
        <div class="card">
          <img src="assets/${p.id}.jpg" alt="${p.name}" class="product-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23eee9e1%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2214%22%3EImmagine%3C/text%3E%3C/svg%3E'" />
          <div class="badge">${p.brand}</div>
          <div class="product-name">${p.name}</div>
          <div class="meta">${p.size}</div>
          <div class="price-tag">Prezzo su richiesta</div>
          <button class="add" onclick="addToList(${p.id})">Aggiungi alla lista</button>
        </div>
      `).join("") : '<div class="empty">Nessun prodotto trovato</div>';
      
      updateCount();
    }

    function setFilter(brand) {
      activeFilter = brand;
      render();
    }

    function addToList(id) {
      if (!list.includes(id)) {
        list.push(id);
        localStorage.setItem("list", JSON.stringify(list));
        updateCount();
        renderPanel();
      }
    }

    function removeFromList(id) {
      list = list.filter(i => i !== id);
      localStorage.setItem("list", JSON.stringify(list));
      updateCount();
      renderPanel();
    }

    function updateCount() {
      document.getElementById("count").textContent = list.length;
    }

    function toggleDrawer() {
      document.getElementById("drawer").classList.toggle("open");
      renderPanel();
    }

    function renderPanel() {
      const items = list.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
      document.getElementById("items").innerHTML = items.length ? items.map(p => `
        <div class="item">
          <img src="assets/${p.id}.jpg" alt="${p.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23eee9e1%22 width=%22200%22 height=%22200%22/%3E%3C/svg%3E'" />
          <div>
            <div class="item-name">${p.name}</div>
            <div class="item-meta">${p.brand} • ${p.size}</div>
          </div>
          <button class="remove" onclick="removeFromList(${p.id})">×</button>
        </div>
      `).join("") : '<div class="empty">La tua lista è vuota</div>';
    }

    function sendWhatsApp(e) {
      e.preventDefault();
      if (!list.length) return alert("Aggiungi prima qualche prodotto!");
      const items = list.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
      const message = "Ciao! Mi interessano questi profumi:\n\n" + 
        items.map(p => `• ${p.name} (${p.brand}, ${p.size})`).join("\n") +
        "\n\nPotete darmi maggiori informazioni e il prezzo?";
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, "_blank");
    }

    render();
  </script>

</html>
