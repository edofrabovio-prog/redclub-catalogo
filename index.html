    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:radial-gradient(circle at 92% 0%,#f0ddd6 0,transparent 26rem),var(--cream); }
    button { font:inherit; cursor:pointer; }
    .shell { max-width:1180px; margin:auto; padding:0 20px 110px; }
    header { display:flex; align-items:center; justify-content:space-between; padding:18px 0; position:sticky; top:0; z-index:5; background:rgba(248,244,237,.78); backdrop-filter:blur(16px); }
    .brand { display:flex; align-items:center; gap:10px; font-family:Georgia,serif; font-size:1.3rem; font-weight:700; letter-spacing:-.04em; }
    .brand-logo { width:45px; height:45px; border-radius:12px; object-fit:cover; object-position:50% 12%; box-shadow:0 5px 14px rgba(0,0,0,.18); }
    .list-button { border:1px solid var(--ink); border-radius:999px; background:var(--ink); color:white; padding:11px 16px; font-weight:750; box-shadow:0 6px 15px rgba(25,21,18,.15); transition:transform .15s,box-shadow .15s; }
    .list-button:hover { transform:translateY(-1px); box-shadow:0 8px 18px rgba(25,21,18,.2); }
    .hero { background:linear-gradient(110deg,rgba(16,13,11,.98),rgba(16,13,11,.78)),url('assets/redclub-logo.png') center 42%/cover; color:white; border-radius:28px; padding:52px clamp(24px,6vw,72px); margin-bottom:30px; overflow:hidden; position:relative; box-shadow:0 18px 40px rgba(29,20,15,.2); }
    .hero::after { content:""; width:270px; height:270px; border:1px solid rgba(255,255,255,.3); border-radius:50%; position:absolute; right:-90px; top:-115px; }
    .eyebrow { color:#f19a86; font-size:.78rem; text-transform:uppercase; letter-spacing:.16em; font-weight:800; }
    h1 { max-width:620px; font:700 clamp(2.35rem,6vw,4.8rem)/.96 Georgia,serif; letter-spacing:-.055em; margin:14px 0; position:relative; z-index:1; }
    .hero p { color:#e0d9cf; max-width:530px; margin:0; line-height:1.55; position:relative; z-index:1; }
    
    /* Toolbar avanzata */
    .toolbar { display:flex; gap:14px; flex-wrap:wrap; margin:28px 0 20px; align-items:stretch; }
    
    /* Barra di ricerca elegante */
    .search-wrapper { flex:1 1 320px; min-width:0; position:relative; }
    .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--muted); pointer-events:none; transition:color .2s; }
    .search { width:100%; border:1.5px solid var(--line); border-radius:14px; padding:14px 46px 14px 46px; background:var(--paper); font:inherit; font-size:.95rem; color:var(--ink); transition:all .25s ease; box-shadow:0 2px 8px rgba(41,29,20,.04); }
    .search::placeholder { color:#a89f94; font-style:italic; }
    .search:hover { border-color:#c9bfb2; box-shadow:0 4px 14px rgba(41,29,20,.08); }
    .search:focus { outline:none; border-color:var(--red); box-shadow:0 0 0 4px rgba(194,43,38,.12), 0 4px 14px rgba(41,29,20,.08); }
    .search:focus ~ .search-icon { color:var(--red); }
    .search-clear { position:absolute; right:14px; top:50%; transform:translateY(-50%); width:26px; height:26px; border-radius:50%; border:0; background:rgba(114,106,98,.12); color:var(--muted); display:none; align-items:center; justify-content:center; transition:all .15s; }
    .search-clear:hover { background:var(--red); color:white; }
    .search-clear.visible { display:flex; }
    
    /* Filtri con "Tutti" differenziato */
    .filters-wrapper { display:flex; align-items:center; gap:10px; flex:1 1 auto; min-width:0; }
    .filter-all { flex-shrink:0; border:2px solid var(--ink); border-radius:999px; padding:11px 20px; background:var(--ink); color:white; font-weight:800; font-size:.92rem; letter-spacing:.02em; white-space:nowrap; box-shadow:0 4px 12px rgba(25,21,18,.15); transition:all .2s; }
    .filter-all:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(25,21,18,.22); }
    .filter-all.active { background:var(--red); border-color:var(--red); box-shadow:0 4px 14px rgba(194,43,38,.3); }
    .filters-divider { width:1px; height:28px; background:var(--line); flex-shrink:0; margin:0 4px; }
    .filters { display:flex; gap:8px; overflow-x:auto; padding:4px 2px; scrollbar-width:thin; scrollbar-color:var(--line) transparent; flex:1; min-width:0; }
    .filters::-webkit-scrollbar { height:4px; }
    .filters::-webkit-scrollbar-thumb { background:var(--line); border-radius:2px; }
    .filter { border:1px solid var(--line); border-radius:999px; padding:10px 14px; background:var(--paper); color:var(--muted); white-space:nowrap; font-size:.88rem; font-weight:600; transition:all .18s; flex-shrink:0; }
    .filter:hover { border-color:var(--ink); color:var(--ink); }
    .filter.active { color:white; background:var(--ink); border-color:var(--ink); }
    
    .notice { color:var(--muted); margin:0 0 18px; font-size:.92rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(205px,1fr)); gap:16px; }
    .card { background:rgba(255,253,250,.9); border:1px solid rgba(231,223,212,.88); border-radius:18px; padding:12px; display:flex; flex-direction:column; min-height:340px; box-shadow:0 8px 24px rgba(41,29,20,.05); transition:transform .18s,box-shadow .18s; }
    .card:hover { transform:translateY(-4px); box-shadow:0 16px 30px rgba(41,29,20,.12); }
    .product-image { width:100%; height:190px; object-fit:cover; border-radius:10px; background:#eee9e1; }
    .badge { align-self:flex-start; color:var(--red); background:#fdeae6; padding:5px 8px; border-radius:999px; font-size:.72rem; font-weight:800; margin-top:12px; }
    .product-name { font:700 1.04rem/1.2 Georgia,serif; margin:9px 0 4px; }
    .meta { color:var(--muted); font-size:.83rem; margin:0 0 14px; }
    .price-tag { color:var(--red); font-weight:700; font-size:.9rem; margin:0 0 14px; }
    .add { width:100%; margin-top:auto; padding:11px; border:0; border-radius:10px; color:white; background:var(--ink); font-weight:750; transition:background .15s,transform .15s; }
    .add:hover { background:var(--red); }
    .add:active { transform:scale(.98); }
    .empty { grid-column:1/-1; text-align:center; padding:46px 12px; color:var(--muted); }
    .drawer { position:fixed; inset:0; background:rgba(20,16,12,.48); opacity:0; pointer-events:none; transition:.2s; z-index:10; }
    .drawer.open { opacity:1; pointer-events:auto; }
    .panel { position:absolute; right:0; top:0; bottom:0; width:min(440px,100%); background:var(--paper); padding:24px; transform:translateX(100%); transition:.25s; display:flex; flex-direction:column; }
    .drawer.open .panel { transform:none; }
    .panel-head { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line); padding-bottom:17px; }
    .panel h2 { font:700 1.8rem Georgia,serif; margin:0; }
    .close { background:none; border:0; font-size:1.6rem; line-height:1; }
    .items { overflow:auto; flex:1; }
    .item { display:grid; grid-template-columns:58px 1fr auto; gap:11px; align-items:center; padding:15px 0; border-bottom:1px solid var(--line); }
    .item img { width:58px; height:58px; object-fit:cover; border-radius:8px; }
    .item-name { font-weight:700; margin:0 0 3px; }
    .item-meta { color:var(--muted); font-size:.82rem; margin:0; }
    .remove { background:none; border:0; color:var(--red); font-size:1.2rem; padding:4px 8px; }
    .panel-foot { border-top:1px solid var(--line); padding-top:17px; margin-top:12px; }
    .whatsapp { display:block; width:100%; padding:14px; border:0; border-radius:12px; color:white; background:#25D366; font-weight:800; font-size:1rem; text-align:center; text-decoration:none; box-shadow:0 8px 20px rgba(37,211,102,.25); transition:background .15s,transform .15s; }
    .whatsapp:hover { background:#1da851; transform:translateY(-1px); }
    .count { display:inline-block; background:var(--red); color:white; border-radius:999px; padding:2px 8px; font-size:.78rem; margin-left:6px; font-weight:800; }
  </style>

            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="filters-wrapper">
        <button class="filter-all active" id="filterAll" onclick="setFilter('Tutti')">Tutti</button>
        <div class="filters-divider"></div>
        <div class="filters" id="filters"></div>

    </div>
    <p class="notice">Tutti i prodotti sono disponibili. Prezzo su richiesta.</p>
    <div class="grid" id="grid"></div>

      <div class="panel-foot">
        <a class="whatsapp" id="whatsapp" href="#" onclick="sendWhatsApp(event)">Invia su WhatsApp</a>

      {id: 874, name: "Parfums de Marly Pegasus", brand: "Parfums de Marly", size: "125ML"},
      {id: 875, name: "Parfums de Marly Pegasus Exclusif", brand: "Parfums de Marly", size: "125ML"},
      {id: 877, name: "Parfums de Marly Kalan", brand: "Parfums de Marly", size: "125ML"},
      {id: 878, name: "Parfums de Marly Herod", brand: "Parfums de Marly", size: "125ML"},
      {id: 879, name: "Parfums de Marly Layton Exclusif", brand: "Parfums de Marly", size: "125ML"},
      {id: 880, name: "Parfums de Marly Delina", brand: "Parfums de Marly", size: "125ML"},
      {id: 881, name: "Parfums de Marly Delina Exclusif", brand: "Parfums de Marly", size: "125ML"},
      
      // NUOVI MARCHI - RALPH LAUREN
      {id: 1009, name: "Polo Blue", brand: "Ralph Lauren", size: "125ML"},
      {id: 1010, name: "Polo Red", brand: "Ralph Lauren", size: "125ML"},
      {id: 1011, name: "Polo Black", brand: "Ralph Lauren", size: "125ML"},
      {id: 1012, name: "Polo Green", brand: "Ralph Lauren", size: "125ML"},
      {id: 1013, name: "Polo Ultra Blue", brand: "Ralph Lauren", size: "125ML"},
      {id: 1014, name: "Polo Supreme Oud", brand: "Ralph Lauren", size: "125ML"},
      
      // NUOVI MARCHI - CREED
      {id: 1114, name: "Creed Aventus", brand: "Creed", size: "100ML"},
      {id: 1115, name: "Creed Green Irish Tweed", brand: "Creed", size: "100ML"},
      {id: 1116, name: "Creed Silver Mountain Water", brand: "Creed", size: "100ML"},
      {id: 1117, name: "Creed Virgin Island Water", brand: "Creed", size: "100ML"},
    ];

    const WHATSAPP_NUMBER = "391234567890"; // ⚠️ CAMBIA CON IL TUO NUMERO WHATSAPP
    let list = JSON.parse(localStorage.getItem("list") || "[]");
    let activeFilter = "Tutti";

    function render() {
      const search = document.getElementById("search").value.toLowerCase();
      const brands = [...new Set(PRODUCTS.map(p => p.brand))].sort();
      
      document.getElementById("filters").innerHTML = brands.map(b => 
        `<button class="filter ${b === activeFilter ? 'active' : ''}" onclick="setFilter('${b.replace(/'/g, "\\'")}')">${b}</button>`
      ).join("");
      
      // Aggiorna lo stato del pulsante "Tutti"
      document.getElementById("filterAll").classList.toggle("active", activeFilter === "Tutti");
      
      const filtered = PRODUCTS.filter(p => 
        (activeFilter === "Tutti" || p.brand === activeFilter) &&
        (p.name.toLowerCase().includes(search) || p.brand.toLowerCase().includes(search))
      );
      
      document.getElementById("grid").innerHTML = filtered.length ? filtered.map(p => `
        <div class="card">
          <img src="assets/${p.id}.jpg" alt="${p.name}" class="product-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23eee9e1%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2214%22%3EImmagine%3C/text%3E%3C/svg%3E'" />
          <div class="badge">${p.brand}</div>
          <div class="product-name">${p.name}</div>
          <div class="meta">${p.size}</div>
          <div class="price-tag">Prezzo su richiesta</div>
          <button class="add" onclick="addToList(${p.id})">Aggiungi alla lista</button>
        </div>
      `).join("") : '<div class="empty">Nessun prodotto trovato</div>';
      
      updateCount();
    }

    function setFilter(brand) {
      activeFilter = brand;
      render();
      // Scrolla i filtri per mostrare quello attivo
      if (brand !== "Tutti") {
        const activeBtn = document.querySelector('.filter.active');
        if (activeBtn) activeBtn.scrollIntoView({behavior: 'smooth', block: 'nearest', inline: 'center'});
      }
    }

    function addToList(id) {
      // Permette di aggiungere lo stesso prodotto più volte
      list.push(id);
      localStorage.setItem("list", JSON.stringify(list));
      updateCount();
      renderPanel();
    }

    function removeFromList(index) {
      // Rimuove solo l'elemento all'indice specifico (una singola occorrenza)
      list.splice(index, 1);
      localStorage.setItem("list", JSON.stringify(list));
      updateCount();
      renderPanel();
    }

    function updateCount() {
      document.getElementById("count").textContent = list.length;
    }

    function toggleDrawer() {
      document.getElementById("drawer").classList.toggle("open");
      renderPanel();
    }

    function renderPanel() {
      const items = list.map((id, index) => ({product: PRODUCTS.find(p => p.id === id), index})).filter(i => i.product);
      document.getElementById("items").innerHTML = items.length ? items.map(i => `
        <div class="item">
          <img src="assets/${i.product.id}.jpg" alt="${i.product.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23eee9e1%22 width=%22200%22 height=%22200%22/%3E%3C/svg%3E'" />
          <div>
            <div class="item-name">${i.product.name}</div>
            <div class="item-meta">${i.product.brand} • ${i.product.size}</div>
          </div>
          <button class="remove" onclick="removeFromList(${i.index})" aria-label="Rimuovi">×</button>
        </div>
      `).join("") : '<div class="empty">La tua lista è vuota</div>';
    }

    function sendWhatsApp(e) {
      e.preventDefault();
      if (!list.length) return alert("Aggiungi prima qualche prodotto!");
      
      // Raggruppa i prodotti per id contando le quantità
      const grouped = {};
      list.forEach(id => {
        if (!grouped[id]) grouped[id] = {product: PRODUCTS.find(p => p.id === id), count: 0};
        grouped[id].count++;
      });
      
      const items = Object.values(grouped).filter(i => i.product);
      const message = "Ciao! Mi interessano questi profumi:\n\n" + 
        items.map(i => `• ${i.count > 1 ? i.count + 'x ' : ''}${i.product.name} (${i.product.brand}, ${i.product.size})`).join("\n") +
        "\n\nPotete darmi maggiori informazioni e il prezzo?";
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, "_blank");
    }

    function updateClearBtn() {
      const search = document.getElementById("search");
      const clearBtn = document.getElementById("searchClear");
      clearBtn.classList.toggle("visible", search.value.length > 0);
    }

    function clearSearch() {
      document.getElementById("search").value = "";
      updateClearBtn();
      render();
      document.getElementById("search").focus();
    }

    render();
  </script>
</body>
</html>
